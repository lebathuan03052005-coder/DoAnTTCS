<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Đăng nhập | The King Restaurant</title>
    <link rel="stylesheet" href="style.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Poppins:wght@300;400;600&display=swap"
      rel="stylesheet"
    />
  </head>
  <body class="login-bg">
    <div class="bg-overlay"></div>
    <header>
      <nav class="navbar">
        <div class="logo">
          <div class="main-logo">The King <span>Restaurant</span></div>
          <span class="tagline">Trải nghiệm hoàng gia - Giá không xa hoa </span>
        </div>
        <ul class="nav-links">
          <li><a href="index.html">Trang Chủ</a></li>
          <li><a href="menu.html">Menu</a></li>
          <li><a href="booking.html">Đặt Bàn</a></li>
        </ul>
        <a href="login.html" class="btn-book">Đăng nhập</a>
      </nav>
    </header>

    <main class="login-page">
      <div class="login-box">
        <h2>Đăng nhập</h2>
        <form action="#" method="POST" class="login-form">
          <label for="email">Email hoặc Số điện thoại</label>
          <input id="email" name="email" type="text" placeholder="Nhập email hoặc số điện thoại" required />

          <label for="password">Mật khẩu</label>
          <input id="password" name="password" type="password" placeholder="Mật khẩu" required />

          <div class="login-row">
            <label class="remember"><input type="checkbox" /> Ghi nhớ tôi</label>
              <a class="forgot" href="forgot.html">Quên mật khẩu?</a>
          </div>

          <div class="message" id="login-message"></div>
          <button type="submit" class="btn-submit login-btn">ĐĂNG NHẬP</button>

          <p class="signup">Chưa có tài khoản? <a href="register.html">Đăng ký</a></p>
        </form>
      </div>
    </main>
    <script src="auth.js"></script>
    <script src="chatbot.js"></script>
  </body>
</html>
